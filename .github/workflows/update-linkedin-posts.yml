name: Update LinkedIn Posts

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  update-linkedin-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright

      - name: Scrape LinkedIn public posts
        env:
          LINKEDIN_ACTIVITY_URL: https://www.linkedin.com/in/paulo-henrique-mendes/recent-activity/all/
          LINKEDIN_PROFILE_URL: https://www.linkedin.com/in/paulo-henrique-mendes/
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
        run: node .github/scripts/update-linkedin-posts.mjs

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add linkedin-posts.json
          git diff --cached --quiet || git commit -m "chore: update LinkedIn posts"
          git push
